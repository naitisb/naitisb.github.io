<script>
  // Add your photos here: drop image files into images/photos/ and list them below.
  // Each entry needs a src (path to the image) and alt (short description).
  const photos = [
    { src: "images/photos/coffee-roasting-sunset.jpg", alt: "Home coffee roasting on the deck at sunset" },
    { src: "images/photos/coffee-cupping-tasting.jpg", alt: "Coffee cupping bowls set up for a tasting session" },
    { src: "images/photos/coffee-pour-over-cafe.jpg", alt: "Pour-over coffee at a cafe table" },
    { src: "images/photos/coffee-cherries-farm.jpg", alt: "Fresh coffee cherries held at an origin farm" },
    { src: "images/photos/coffee-roastery-visit.jpg", alt: "Visiting a roastery with large copper roasters" },
    { src: "images/photos/coffee-farm-processing.jpg", alt: "Coffee cherries drying at a processing facility" },
    { src: "images/photos/coffee-brewbar-mumbai.jpg", alt: "Pour-over brew bar at a cafe in Mumbai" },
    { src: "images/photos/coffee-home-station.jpg", alt: "Home coffee brewing station" },
    { src: "images/photos/swim-arms-raised-sunset.jpg", alt: "Swimming with arms raised in the waves at sunset" },
    { src: "images/photos/swim-splash-pool.jpg", alt: "Mid-splash swimming in a teal pool" },
    { src: "images/photos/swim-turquoise-cove.jpg", alt: "Swimming in a turquoise rocky cove" },
    { src: "images/photos/swim-sunset-ocean.jpg", alt: "Swimming in the ocean at sunset" },
    { src: "images/photos/swim-cold-plunge.jpg", alt: "A cold-water plunge event" },
    { src: "images/photos/swim-open-water.jpg", alt: "Open-water freestyle swimming" },
  ];

  const grid = document.getElementById("photoGrid");
  if (photos.length === 0) {
    for (let i = 0; i < 6; i++) {
      const fig = document.createElement("figure");
      fig.innerHTML = '<span class="photo-placeholder">Photo coming soon</span>';
      grid.appendChild(fig);
    }
  } else {
    photos.forEach(p => {
      const fig = document.createElement("figure");
      const img = document.createElement("img");
      img.src = p.src;
      img.alt = p.alt;
      img.loading = "lazy";
      fig.appendChild(img);
      grid.appendChild(fig);
    });
  }
</script>
